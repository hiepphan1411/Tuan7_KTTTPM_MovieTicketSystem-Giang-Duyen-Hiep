<section class="page">
  <div class="page-header">
    <div>
      <span class="eyebrow">History</span>
      <h1>Your bookings</h1>
      <p>Track pending and completed tickets.</p>
    </div>
  </div>

  <div *ngIf="loading" class="loading">Loading bookings...</div>

  <div class="booking-list" *ngIf="!loading">
    <div class="booking-item" *ngFor="let booking of bookings">
      <div>
        <h3>{{ booking.movieTitle }}</h3>
        <p>Seats: {{ booking.numberOfSeats }}</p>
      </div>
      <div class="booking-meta">
        <span class="price">{{ booking.totalAmount | number: '1.0-0' }} VND</span>
        <span class="status" [class.failed]="booking.status === 'FAILED'">
          {{ booking.status }}
        </span>
      </div>
    </div>
  </div>

  <div *ngIf="!loading && bookings.length === 0" class="empty">No bookings yet.</div>
</section>
