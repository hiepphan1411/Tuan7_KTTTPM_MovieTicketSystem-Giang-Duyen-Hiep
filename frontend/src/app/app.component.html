<div class="app-shell">
  <header class="app-header">
    <a class="brand" routerLink="/movies">MovieFlow</a>

    <nav class="nav-links" *ngIf="isLoggedIn()">
      <a routerLink="/movies" routerLinkActive="active">Movies</a>
      <a routerLink="/bookings" routerLinkActive="active">Bookings</a>
    </nav>

    <div class="nav-actions">
      <a *ngIf="!isLoggedIn()" class="btn ghost" routerLink="/login">Sign in</a>
      <a *ngIf="!isLoggedIn()" class="btn" routerLink="/register">Create account</a>
      <button *ngIf="isLoggedIn()" class="btn ghost" (click)="logout()">Logout</button>
    </div>
  </header>

  <main class="app-main">
    <router-outlet></router-outlet>
  </main>
</div>
